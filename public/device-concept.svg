<svg viewBox="0 0 1040 680" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#161310"/>
      <stop offset="1" stop-color="#1c1812"/>
    </linearGradient>
    <linearGradient id="cool" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6efe0"/>
      <stop offset="1" stop-color="#dcbb78"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8a6d38"/>
      <stop offset=".5" stop-color="#c9a865"/>
      <stop offset="1" stop-color="#8a6d38"/>
    </linearGradient>
    <linearGradient id="pcm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c9a865"/>
      <stop offset="1" stop-color="#8a6d38"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="14%" r="72%">
      <stop offset="0" stop-color="#c9a865" stop-opacity=".16"/>
      <stop offset="1" stop-color="#c9a865" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="8%" cy="100%" r="60%">
      <stop offset="0" stop-color="#c9a865" stop-opacity=".08"/>
      <stop offset="1" stop-color="#c9a865" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrCool" markerWidth="9" markerHeight="9" refX="5" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#dcbb78"/></marker>
    <marker id="arrWarm" markerWidth="9" markerHeight="9" refX="5" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#8a6d38"/></marker>
  </defs>

  <style>
    .surface{animation:surf 3.4s ease-in-out infinite}
    .coolflow{animation:cool 2.2s ease-in-out infinite}
    .warmflow{animation:warm 2.6s ease-in-out infinite}
    .scratch{animation:scr 1.5s ease-in-out infinite}
    .glow{animation:glow 6s ease-in-out infinite}
    .d{animation-delay:.45s}
    @keyframes surf{0%,100%{opacity:.82}50%{opacity:1}}
    @keyframes cool{0%,100%{opacity:.3;transform:translateY(5px)}50%{opacity:1;transform:translateY(0)}}
    @keyframes warm{0%,100%{opacity:.3;transform:translateY(-5px)}50%{opacity:1;transform:translateY(0)}}
    @keyframes scr{0%,100%{opacity:.45}50%{opacity:1}}
    @keyframes glow{0%,100%{opacity:.6}50%{opacity:1}}
    @media (prefers-reduced-motion: reduce){
      .surface,.coolflow,.warmflow,.scratch,.glow{animation:none}
    }
  </style>

  <rect width="1040" height="680" fill="url(#bg)"/>
  <rect class="glow" width="1040" height="680" fill="url(#glow)"/>
  <rect width="1040" height="680" fill="url(#glow2)"/>

  <!-- title -->
  <text x="60" y="58" fill="#f6efe0" font-size="27" font-weight="700" font-family="'Cormorant Garamond','Songti SC',Georgia,serif">Histo-Cooling</text>
  <text x="60" y="84" fill="rgba(239,231,216,.55)" font-size="14" letter-spacing="1.5">结构概念剖视 · Concept cross-section</text>
  <text x="980" y="58" fill="#c9a865" font-size="12" text-anchor="end" letter-spacing="2">迈领云 MYELIN CLOUD</text>

  <!-- user / scratch motif -->
  <path d="M360 150 q160 -34 320 0" fill="none" stroke="rgba(201,168,101,.4)" stroke-width="2" stroke-dasharray="2 5" opacity=".8"/>
  <text x="520" y="138" fill="rgba(239,231,216,.55)" font-size="12" text-anchor="middle">用户接触面 · skin side</text>
  <g class="scratch" opacity=".9" stroke="#c9a865" stroke-width="2" fill="none">
    <path d="M610 158 q6 -10 12 0"/><path d="M624 158 q6 -10 12 0"/><path d="M638 158 q6 -10 12 0"/>
  </g>

  <!-- device body cutaway -->
  <g>
    <!-- outer IP68 shell -->
    <rect x="320" y="180" width="400" height="320" rx="34" fill="#1c1812" stroke="#c9a865" stroke-width="2.5"/>
    <rect x="320" y="180" width="400" height="320" rx="34" fill="none" stroke="#c9a865" stroke-width="6" opacity=".10"/>

    <!-- hydrophobic + contact thermal layer (cooling surface) -->
    <rect class="surface" x="346" y="196" width="348" height="22" rx="11" fill="url(#cool)"/>
    <rect x="346" y="222" width="348" height="10" rx="5" fill="#dcbb78" opacity=".4"/>

    <!-- TEC modules -->
    <g>
      <rect x="404" y="244" width="64" height="30" rx="4" fill="#241f18" stroke="rgba(201,168,101,.45)" stroke-width="1.5"/>
      <rect x="488" y="244" width="64" height="30" rx="4" fill="#241f18" stroke="rgba(201,168,101,.45)" stroke-width="1.5"/>
      <rect x="572" y="244" width="64" height="30" rx="4" fill="#241f18" stroke="rgba(201,168,101,.45)" stroke-width="1.5"/>
    </g>
    <text x="520" y="263" fill="rgba(239,231,216,.7)" font-size="11" text-anchor="middle">TEC ×n</text>

    <!-- liquid metal thermal bus -->
    <rect x="346" y="288" width="348" height="20" rx="10" fill="url(#metal)"/>
    <g stroke="#efe7d8" stroke-width="1" opacity=".35">
      <line x1="380" y1="298" x2="660" y2="298"/>
    </g>

    <!-- PCM in aluminum diffuser -->
    <rect x="360" y="322" width="320" height="56" rx="10" fill="url(#pcm)" opacity=".95"/>
    <rect x="354" y="316" width="332" height="68" rx="12" fill="none" stroke="rgba(201,168,101,.5)" stroke-width="2" opacity=".7"/>
    <text x="520" y="356" fill="#221a0e" font-size="12" font-weight="600" text-anchor="middle">PCM 38–44°C</text>

    <!-- internals: battery, MCU, IMU, SE -->
    <rect x="360" y="398" width="120" height="40" rx="8" fill="#241f18" stroke="rgba(201,168,101,.35)" stroke-width="1.5"/>
    <text x="420" y="423" fill="rgba(239,231,216,.7)" font-size="11" text-anchor="middle">电池 Battery</text>

    <rect x="496" y="398" width="84" height="40" rx="8" fill="#241f18" stroke="rgba(201,168,101,.35)" stroke-width="1.5"/>
    <text x="538" y="423" fill="rgba(239,231,216,.7)" font-size="11" text-anchor="middle">MCU</text>

    <rect x="596" y="398" width="84" height="40" rx="8" fill="#241f18" stroke="rgba(201,168,101,.35)" stroke-width="1.5"/>
    <text x="638" y="417" fill="rgba(239,231,216,.7)" font-size="10" text-anchor="middle">IMU ·</text>
    <text x="638" y="430" fill="rgba(239,231,216,.7)" font-size="10" text-anchor="middle">安全元件</text>

    <!-- no vents note inside shell bottom -->
    <text x="520" y="470" fill="#c9a865" font-size="11" text-anchor="middle">无通气孔 · 无风扇 · 无水泵 — fully sealed</text>

    <!-- thermal flow arrows -->
    <!-- cold up to surface -->
    <line class="coolflow" x1="404" y1="244" x2="404" y2="220" stroke="#dcbb78" stroke-width="2" marker-end="url(#arrCool)"/>
    <line class="coolflow d" x1="636" y1="244" x2="636" y2="220" stroke="#dcbb78" stroke-width="2" marker-end="url(#arrCool)"/>
    <!-- heat down into bus -> pcm -->
    <line class="warmflow" x1="520" y1="288" x2="520" y2="322" stroke="#8a6d38" stroke-width="2" marker-end="url(#arrWarm)"/>
    <!-- heat to shell (passive) -->
    <line class="warmflow d" x1="680" y1="368" x2="714" y2="368" stroke="#8a6d38" stroke-width="2" marker-end="url(#arrWarm)"/>
  </g>

  <!-- LEFT labels -->
  <g font-size="13" fill="#f6efe0">
    <line x1="200" y1="207" x2="346" y2="207" stroke="#c9a865" stroke-width="1.2" opacity=".55"/>
    <circle cx="346" cy="207" r="3" fill="#c9a865"/>
    <text x="60" y="204">接触面导热层（降温）</text>
    <text x="60" y="221" fill="rgba(239,231,216,.55)" font-size="11">Cooling contact surface</text>

    <line x1="240" y1="259" x2="404" y2="259" stroke="#c9a865" stroke-width="1.2" opacity=".55"/>
    <circle cx="404" cy="259" r="3" fill="#c9a865"/>
    <text x="60" y="256">半导体制冷元件</text>
    <text x="60" y="273" fill="rgba(239,231,216,.55)" font-size="11">Thermoelectric cooler</text>

    <line x1="220" y1="298" x2="346" y2="298" stroke="#c9a865" stroke-width="1.2" opacity=".55"/>
    <circle cx="346" cy="298" r="3" fill="#c9a865"/>
    <text x="60" y="295">液态金属导热总线</text>
    <text x="60" y="312" fill="rgba(239,231,216,.55)" font-size="11">Liquid-metal thermal bus</text>
  </g>

  <!-- RIGHT labels -->
  <g font-size="13" fill="#f6efe0" text-anchor="start">
    <line x1="720" y1="207" x2="860" y2="207" stroke="#c9a865" stroke-width="1.2" opacity=".55"/>
    <circle cx="720" cy="207" r="3" fill="#c9a865"/>
    <text x="868" y="204">IP68 气密外壳</text>
    <text x="868" y="221" fill="rgba(239,231,216,.55)" font-size="11">Hermetic shell · disinfectable</text>

    <line x1="720" y1="346" x2="860" y2="346" stroke="#c9a865" stroke-width="1.2" opacity=".55"/>
    <circle cx="720" cy="346" r="3" fill="#c9a865"/>
    <text x="868" y="343">相变材料热缓冲</text>
    <text x="868" y="364" fill="rgba(239,231,216,.55)" font-size="11">PCM heat buffer (Al diffuser)</text>

    <line x1="680" y1="418" x2="860" y2="418" stroke="#c9a865" stroke-width="1.2" opacity=".55"/>
    <circle cx="680" cy="418" r="3" fill="#c9a865"/>
    <text x="868" y="415">密封电池 · MCU · IMU</text>
    <text x="868" y="432" fill="rgba(239,231,216,.55)" font-size="11">Sealed battery · MCU · IMU · SE</text>
  </g>

  <!-- thermal legend -->
  <g transform="translate(60,560)" font-size="12">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="url(#cool)"/>
    <text x="22" y="11" fill="rgba(239,231,216,.6)">冷量 Cooling →接触面</text>
    <rect x="190" y="0" width="14" height="14" rx="3" fill="url(#pcm)"/>
    <text x="212" y="11" fill="rgba(239,231,216,.6)">余热 Heat →PCM →外壳被动散热</text>
  </g>

  <text x="60" y="640" fill="rgba(239,231,216,.4)" font-size="11">示意图，非实际比例与外观 · Illustrative concept, not to scale or final appearance. 研发中 / in development.</text>
</svg>
